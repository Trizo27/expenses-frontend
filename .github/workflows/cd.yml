name: Spendly Frontend CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync to server
        run: |
          rsync -e "ssh -o StrictHostKeyChecking=no" -rlzm \
          --verbose --checksum --delete --itemize-changes \
          --exclude='.git/' \
          --exclude='node_modules/' \
          --exclude='.env' \
          . deploy@lab06.42m.work:/var/www/lab06.42m.work/front/

      - name: SSH - Run post-deploy commands
        run: |
          ssh -o StrictHostKeyChecking=no deploy@lab06.42m.work << 'EOF'
            cd /var/www/lab06.42m.work/front
            npm install
            npm run build
          EOF
